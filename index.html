<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彰化分署書記官打字測驗預約表單</title>
    <meta property="og:title" content="彰化分署書記官打字測驗預約表單">
    <meta property="og:description" content="請輸入表單密碼以進入填報表單">
    <meta property="og:type" content="website">
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; touch-action: pan-x pan-y; }
        .container { background: white; padding: 20px 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; position: relative; }
        h2 { text-align: center; color: #333; margin-top: 0; margin-bottom: 10px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; background-color: white; }
        input:focus, select:focus { border-color: #4CAF50; outline: none; }
        .btn-primary { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; -webkit-appearance: none; }
        .btn-primary:hover { background-color: #45a049; }
        .btn-secondary { width: 100%; padding: 10px; background-color: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; -webkit-appearance: none; }
        .btn-info { width: 100%; padding: 10px; background-color: #17a2b8; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-bottom: 10px; -webkit-appearance: none; }
        .btn-warning { width: 100%; padding: 10px; background-color: #ff9800; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; -webkit-appearance: none; }
        .readonly-field { background-color: #e9ecef; color: #495057; }
        .hidden { display: none !important; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .status-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        .status-table th, .status-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .status-table th { background-color: #f2f2f2; }
        .scrollable-list { max-height: 300px; overflow-y: auto; margin-top: 10px; border: 1px solid #eee; }
        .hint { color: #666; font-size: 0.85em; text-align: center; line-height: 1.6; margin-bottom: 15px; }
        #customAlert { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.3); z-index: 10000; width: 80%; max-width: 350px; text-align: center; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; }
    </style>
</head>
<body>

    <div class="container" id="loginSection">
        <h2>彰化分署115上半年<br>書記官打字測驗預約表單</h2>
        <div class="form-group">
            <label>1. 表單密碼</label>
            <input type="password" id="passwordInput" placeholder="請輸入表單密碼" autocomplete="off">
        </div>
        <div class="form-group">
            <label>2. 電腦帳號(開機帳號)</label>
            <input type="password" id="adInput" placeholder="請輸入您的電腦帳號(開機帳號)" autocomplete="off">
        </div>
        <div class="form-group">
            <label>3. 案管系統帳號</label>
            <input type="password" id="caseInput" placeholder="請輸入您的案管系統帳號" autocomplete="off">
        </div>
        <button class="btn-primary" onclick="checkAuth()">驗證並進入</button>
        <p class="hint" style="margin-top: 15px;">
            開放時間：115/02/18 08:00<br>
            截止時間：115/02/20 17:00
        </p>
        <p id="loginMsg" style="color:red; text-align:center;"></p>
    </div>

    <div class="container hidden" id="closedSection">
        <h2 style="color: #dc3545;">表單已截止</h2>
        <p style="text-align:center; color:#666;">表單填報時間已結束<br>如有疑問，請聯繫資訊工程師#3216</p>
    </div>

    <div class="container hidden" id="formSection">
        <button class="btn-info" onclick="toggleSection('querySection')">🔍 查詢填報狀態</button>
        <h2>彰化分署115上半年<br>書記官打字測驗預約表單</h2>
        <div class="hint">
            請確認您的資訊並選擇測驗時段<br>
            若需修改，請重新進入表單填寫再次提交資料
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
        
        <form id="dataForm" onsubmit="handleFormSubmit(event)">
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="autoName" class="readonly-field" readonly>
            </div>
            <div class="form-group">
                <label>股別 / 職稱</label>
                <input type="text" id="autoInfo" class="readonly-field" readonly>
            </div>
            <div class="form-group">
                <label>選擇測驗時段</label>
                <select id="timeSelect" required>
                    <option value="" disabled selected>請選擇時段...</option>
                    <option value="115/03/19 09:00-10:00">115/03/19 09:00-10:00</option>
                    <option value="115/03/19 10:00-11:00">115/03/19 10:00-11:00</option>
                    <option value="115/03/19 11:00-12:00">115/03/19 11:00-12:00</option>
                    <option value="115/03/19 14:00-15:00">115/03/19 14:00-15:00</option>
                    <option value="115/03/19 15:00-16:00">115/03/19 15:00-16:00</option>
                    <option value="115/03/20 09:00-10:00">115/03/20 09:00-10:00</option>
                    <option value="115/03/20 10:00-11:00">115/03/20 10:00-11:00</option>
                    <option value="115/03/20 11:00-12:00">115/03/20 11:00-12:00</option>
                    <option value="115/03/20 14:00-15:00">115/03/20 14:00-15:00</option>
                    <option value="115/03/20 15:00-16:00">115/03/20 15:00-16:00</option>
                </select>
            </div>
            <div class="form-group">
                <label>備註</label>
                <input type="text" id="inputNote" placeholder="">
            </div>
            <button type="submit" id="submitBtn" class="btn-primary">確認並提交</button>
        </form>
    </div>

    <div class="container hidden" id="querySection">
        <h2>查詢填報狀態</h2>
        <div class="form-group">
            <label>選擇姓名</label>
            <select id="queryNameSelect">
                <option value="" disabled selected>載入中...</option>
            </select>
        </div>
        <button class="btn-primary" onclick="queryStatus()">查詢個人</button>
        <button class="btn-warning" onclick="showAllStatus()">查詢全部狀態</button>
        <button class="btn-secondary" onclick="toggleSection('formSection')">返回填報頁面</button>

        <div id="allStatusContainer" class="hidden scrollable-list">
            <table class="status-table">
                <thead>
                    <tr><th>姓名</th><th>已填報</th></tr>
                </thead>
                <tbody id="statusTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="container hidden" id="thankYouSection">
        <h2 style="color: #28a745;">提交成功！</h2>
        <p style="text-align:center; margin-bottom: 20px;">您選擇的時段已填報完成</p>
        
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="btn-secondary" style="background-color: #000; flex: 1; border-radius: 6px;" onclick="addToAppleCalendar()">Apple 行事曆</button>
            <button class="btn-secondary" style="background-color: #4285F4; flex: 1; border-radius: 6px;" onclick="addToGoogleCalendar()">Google 行事曆</button>
        </div>

        <button class="btn-primary" onclick="location.reload()">回到首頁</button>
    </div>

    <div id="loading" class="hidden">處理中，請稍候...</div>

    <script>
    var scriptURL = "https://script.google.com/macros/s/AKfycbyoLsbsx_wu9SwWLDrkuByvgVGCde1_oplVOa7K9OZDltrlmwUNNtPBD7110eZa_wbL/exec";
    var allData = [];
    var userData = null;
    var lastSelectedTime = "";
    var DEADLINE_DATE = new Date("2026-03-13T17:00:00");

    document.addEventListener('DOMContentLoaded', function() {
        const loginFields = ['passwordInput', 'adInput', 'caseInput'];
        ['adInput', 'caseInput'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('focus', function() { this.type = 'password'; });
                el.addEventListener('input', function() {
                    this.type = 'text'; 
                    this.value = this.value.replace(/[^a-zA-Z0-9]/g, '');
                });
            }
        });
        const pwdEl = document.getElementById('passwordInput');
        if (pwdEl) {
            pwdEl.addEventListener('input', function() {
                this.value = this.value.replace(/[^a-zA-Z0-9]/g, '');
            });
        }
    });

    window.onload = function() {
        var currentUrl = window.location.href;
        var overlay = document.createElement('div');
        overlay.id = 'overlay';
        document.body.appendChild(overlay);

        var alertBox = document.createElement('div');
        alertBox.id = 'customAlert';
        
        var topHint = document.createElement('p');
        topHint.style.cssText = "color: #555; font-size: 0.85em; margin-bottom: 10px; text-align: center; line-height: 1.4;";
        topHint.innerHTML = "💡 如需使用「加入行事曆」功能<br>請切換至外部瀏覽器開啟";
        alertBox.appendChild(topHint);

        var btnGroup = document.createElement('div');
        btnGroup.style.cssText = "display: flex; gap: 8px; margin-bottom: 20px;";
        
        // Apple 使用者引導
        var appleBtn = document.createElement('button');
        appleBtn.className = "btn-secondary";
        appleBtn.style.cssText = "flex: 1; background-color: #000; font-size: 14px; padding: 8px;";
        appleBtn.innerText = "Apple 使用者";
        appleBtn.onclick = function() {
            showCopyDialog("【Apple 使用者指引】", "請點擊下方按鈕複製網址，並貼上至 Safari 瀏覽器開啟。");
        };

        // Google 使用者引導
        var googleBtn = document.createElement('button');
        googleBtn.className = "btn-secondary";
        googleBtn.style.cssText = "flex: 1; background-color: #4285F4; font-size: 14px; padding: 8px;";
        googleBtn.innerText = "Google 使用者";
        googleBtn.onclick = function() {
            var chromeUrl = currentUrl.replace(/^https?:\/\//, "googlechrome://");
            window.location.href = chromeUrl;
            setTimeout(function() {
                showCopyDialog("【Google 使用者指引】", "若未自動跳轉，請複製網址並使用 Chrome 開啟。");
            }, 1000);
        };

        btnGroup.appendChild(appleBtn);
        btnGroup.appendChild(googleBtn);
        alertBox.appendChild(btnGroup);

        var p = document.createElement('p');
        p.style.cssText = "color: red; font-weight: bold; font-size: 1.1em; margin-bottom: 15px; text-align: center;";
        p.innerHTML = "⚠️系統提示⚠️<br>為確認為本人填報，請輸入驗證資訊";
        alertBox.appendChild(p);

        var btn = document.createElement('button');
        btn.className = "btn-primary";
        btn.innerText = "確定";
        btn.onclick = function() { overlay.remove(); alertBox.remove(); };
        alertBox.appendChild(btn);
        document.body.appendChild(alertBox);

        function showCopyDialog(title, msg) {
            var copyText = currentUrl;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(copyText).then(function() {
                    alert(title + "\n" + msg + "\n\n網址已自動複製成功！\n請直接至瀏覽器貼上開啟。");
                }, function() {
                    window.prompt(title + "\n" + msg + "\n請長按下方網址複製：", copyText);
                });
            } else {
                window.prompt(title + "\n" + msg + "\n請長按下方網址複製：", copyText);
            }
        }

        var now = new Date();
        if (now > DEADLINE_DATE) {
            showSection('closedSection');
            if(overlay) overlay.remove();
            if(alertBox) alertBox.remove();
        }
    };

    function hideMobileKeyboard() {
        if (document.activeElement) document.activeElement.blur();
        var field = document.createElement('input');
        field.setAttribute('type', 'text');
        field.setAttribute('style', 'position:absolute; top: 0px; opacity: 0;');
        document.body.appendChild(field);
        field.focus();
        setTimeout(function() {
            field.blur();
            document.body.removeChild(field);
            window.scrollTo(0, 0);
        }, 50);
    }

    function checkAuth() {
        hideMobileKeyboard();
        var pwd = document.getElementById('passwordInput').value;
        var ad = document.getElementById('adInput').value.trim();
        var caseId = document.getElementById('caseInput').value.trim();

        if (!pwd || !ad || !caseId) {
            setTimeout(function() { alert("請確實填寫所有欄位"); }, 100);
            return;
        }
        if (pwd !== 'chy') {
            setTimeout(function() { alert("表單密碼錯誤"); }, 100);
            return;
        }

        document.getElementById('loading').classList.remove('hidden');
        fetch(scriptURL + "?action=getList")
            .then(res => res.json())
            .then(data => {
                allData = data;
                userData = data.find(item => 
                    item.ad.toLowerCase() === ad.toLowerCase() && 
                    String(item.caseId) === caseId
                );
                if (userData) {
                    setupForm();
                    if (userData.mark === "v") {
                        setTimeout(function(){
                            var confirmRevisit = confirm("系統偵測到您已完成填報\n是否要修改您的資料？");
                            if (!confirmRevisit) { location.reload(); return; }
                            showSection('formSection');
                        }, 200);
                    } else {
                        showSection('formSection');
                    } 
                } else {
                    document.getElementById('loginMsg').innerText = "電腦帳號或案管系統帳號錯誤";
                }
                document.getElementById('loading').classList.add('hidden');
            })
            .catch(err => {
                alert("資料載入失敗，請聯絡資訊工程師#3216");
                document.getElementById('loading').classList.add('hidden');
            });
    }

    function setupForm() {
        document.getElementById('autoName').value = userData.name;
        document.getElementById('autoInfo').value = userData.section + " / " + userData.title;
        var qSelect = document.getElementById('queryNameSelect');
        qSelect.innerHTML = '<option value="" disabled selected>請選擇...</option>';
        allData.forEach(item => {
            var opt = document.createElement('option');
            opt.value = item.name; opt.text = item.name;
            qSelect.appendChild(opt);
        });
    }

    function handleFormSubmit(e) {
        e.preventDefault();
        hideMobileKeyboard();
        var time = document.getElementById('timeSelect').value;
        if (!time) { alert("請選擇測驗時段！"); return; }
        setTimeout(function() {
            if (confirm("確認時段選擇是否正確？\n時段：" + time)) {
                submitData(time);
            }
        }, 100);
    }

    function submitData(selectedTime) {
        lastSelectedTime = selectedTime;
        var btn = document.getElementById('submitBtn');
        btn.disabled = true;
        document.getElementById('loading').classList.remove('hidden');
        var now = new Date();
        var rocYear = now.getFullYear() - 1911; 
        var timestamp = rocYear + "/" +
            String(now.getMonth() + 1).padStart(2, '0') + "/" + 
            String(now.getDate()).padStart(2, '0') + " " + 
            String(now.getHours()).padStart(2, '0') + ":" + 
            String(now.getMinutes()).padStart(2, '0');

        var payload = {
            name: userData.name,
            selectedTime: selectedTime,
            note: document.getElementById('inputNote').value,
            submitTime: timestamp,
            mark: "v"
        };

        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify(payload),
            mode: 'no-cors'
        }).then(() => {
            showSection('thankYouSection');
            document.getElementById('loading').classList.add('hidden');
        }).catch(() => {
            alert("提交失敗，請聯絡資訊工程師#3216");
            btn.disabled = false;
            document.getElementById('loading').classList.add('hidden');
        });
    }

    function formatTimeForGoogle(dateStr, isEnd) {
        let parts = dateStr.split(' ');
        let dateParts = parts[0].split('/');
        let year = parseInt(dateParts[0]) + 1911;
        let month = dateParts[1];
        let day = dateParts[2];
        let timeRange = parts[1].split('-');
        let time = isEnd ? timeRange[1] : timeRange[0];
        let [hh, mm] = time.split(':');
        return `${year}${month}${day}T${hh}${mm}00`;
    }

    function addToGoogleCalendar() {
        if (!lastSelectedTime) { alert("找不到填報時間"); return; }
        const start = formatTimeForGoogle(lastSelectedTime, false);
        const end = formatTimeForGoogle(lastSelectedTime, true);
        const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent("書記官打字測驗")}&dates=${start}/${end}&details=${encodeURIComponent("請準時參加測驗")}&location=${encodeURIComponent("小會議室")}`;
        window.open(url, '_blank');
    }

    function addToAppleCalendar() {
        if (!lastSelectedTime) { alert("找不到填報時間"); return; }
        const start = formatTimeForGoogle(lastSelectedTime, false);
        const end = formatTimeForGoogle(lastSelectedTime, true);
        const icsContent = [
            "BEGIN:VCALENDAR",
            "VERSION:2.0",
            "BEGIN:VEVENT",
            `DTSTART:${start}`,
            `DTEND:${end}`,
            "SUMMARY:書記官打字測驗",
            "DESCRIPTION:請準時參加測驗",
            "LOCATION:小會議室",
            "END:VEVENT",
            "END:VCALENDAR"
        ].join("\r\n");

        const blob = new Blob([icsContent], { type: "text/calendar;charset=utf-8" });
        const url = window.URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.setAttribute("download", "測驗預約.ics");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function showSection(id) {
        ['loginSection', 'closedSection', 'formSection', 'querySection', 'thankYouSection'].forEach(sec => {
            document.getElementById(sec).classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }

    function toggleSection(id) { hideMobileKeyboard(); showSection(id); }

    function queryStatus() {
        var name = document.getElementById('queryNameSelect').value;
        if (!name) { alert("請先選擇姓名"); return; }
        var found = allData.find(i => i.name === name);
        if (found && found.mark === "v") alert(name + " 已完成填報！");
        else alert(name + " 尚未填報。");
    }

    function showAllStatus() {
        var tbody = document.getElementById('statusTableBody');
        tbody.innerHTML = "";
        allData.forEach(item => {
            var tr = document.createElement('tr');
            tr.innerHTML = `<td>${item.name}</td><td>${item.mark === 'v' ? '✔' : ''}</td>`;
            tbody.appendChild(tr);
        });
        document.getElementById('allStatusContainer').classList.remove('hidden');
    }
    </script>
</body>
</html>
